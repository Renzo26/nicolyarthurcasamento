server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão dos textos (as imagens já são JPEG, não recomprimem bem)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Assets com hash no nome podem ser cacheados para sempre
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # O index.html nunca é cacheado: é ele que aponta para os assets novos
    # a cada deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Fallback de SPA: /convite e demais rotas do React Router são resolvidas
    # no cliente. Sem esta linha, abrir o link do convite direto retorna 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
